syntax = "proto3";

package livekit.agent;

option go_package = "github.com/livekit/protocol/livekit/agent";

import "google/protobuf/timestamp.proto";

enum ChatRole {
  DEVELOPER = 0;
  SYSTEM = 1;
  USER = 2;
  ASSISTANT = 3;
}

message MetricsReport {
  google.protobuf.Timestamp started_speaking_at = 1;
  google.protobuf.Timestamp stopped_speaking_at = 2;

  optional double transcription_delay = 3;
  optional double end_of_turn_delay = 4;
  optional double on_user_turn_completed_delay = 5;
  optional double llm_node_ttft = 6;
  optional double tts_node_ttfb = 7;
  optional double e2e_latency = 8;
}

message ChatMessage {
  message ChatContent {
    oneof payload {
      string text = 1;
    }
  }

  string id = 1;
  ChatRole role = 2;
  repeated ChatContent content = 3;
  bool interrupted = 4;
  optional double transcript_confidence = 5;
  map<string, string> extra = 6;
  MetricsReport metrics = 7;
  google.protobuf.Timestamp created_at = 8;
}

message FunctionCall {
  string id = 1;
  string call_id = 2;
  string arguments = 3;
  string name = 4;
  google.protobuf.Timestamp created_at = 5;
}

message FunctionCallOutput {
  string id = 1;
  string name = 2;
  string call_id = 3;
  string output = 4;
  bool is_error = 5;
  google.protobuf.Timestamp created_at = 6;
}

message AgentHandoff {
  string id = 1;
  optional string old_agent_id = 2;
  string new_agent_id = 3;
  google.protobuf.Timestamp created_at = 4;
}

message ChatContext {
  message ChatItem {
    oneof item {
      ChatMessage message = 1;
      FunctionCall function_call = 2;
      FunctionCallOutput function_call_output = 3;
      AgentHandoff agent_handoff = 4;
    }
  }

  repeated ChatItem items = 1;
}

message SessionAudioFrame {
  bytes data = 1;
  uint32 sample_rate = 2;
  uint32 num_channels = 3;
  uint32 samples_per_channel = 4;
}

enum SessionAgentState {
  SESSION_AGENT_STATE_INITIALIZING = 0;
  SESSION_AGENT_STATE_IDLE = 1;
  SESSION_AGENT_STATE_LISTENING = 2;
  SESSION_AGENT_STATE_THINKING = 3;
  SESSION_AGENT_STATE_SPEAKING = 4;
}

enum SessionUserState {
  SESSION_USER_STATE_SPEAKING = 0;
  SESSION_USER_STATE_LISTENING = 1;
  SESSION_USER_STATE_AWAY = 2;
}

message SessionEvent {
  message AgentStateChanged {
    SessionAgentState old_state = 1;
    SessionAgentState new_state = 2;
  }

  message UserStateChanged {
    SessionUserState old_state = 1;
    SessionUserState new_state = 2;
  }

  message ConversationItemAdded {
    ChatContext.ChatItem item = 1;
  }

  message UserInputTranscribed {
    string transcript = 1;
    bool is_final = 2;
    optional string language = 3;
  }

  message FunctionToolsExecuted {
    repeated FunctionCall function_calls = 1;
    repeated FunctionCallOutput function_call_outputs = 2;
  }

  message MetricsCollected {
    MetricsReport metrics = 1;
  }

  message Error {
    string message = 1;
  }

  google.protobuf.Timestamp created_at = 1;
  oneof event {
    AgentStateChanged agent_state_changed = 10;
    UserStateChanged user_state_changed = 11;
    ConversationItemAdded conversation_item_added = 12;
    UserInputTranscribed user_input_transcribed = 13;
    FunctionToolsExecuted function_tools_executed = 14;
    MetricsCollected metrics_collected = 15;
    Error error = 16;
  }
}

message SessionRequest {
  message Ping {}

  message GetState {}
  message GetStateResponse {
    SessionAgentState agent_state = 1;
    SessionUserState user_state = 2;
    string agent_id = 3;
  }

  message GetChatHistory {}
  message GetChatHistoryResponse {
    repeated ChatContext.ChatItem items = 1;
  }

  message SendMessage {
    string text = 1;
  }
  message SendMessageResponse {
    repeated ChatContext.ChatItem items = 1;
  }

  string request_id = 1;
  oneof request {
    Ping ping = 2;
    GetState get_state = 3;
    GetChatHistory get_chat_history = 4;
    SendMessage send_message = 5;
  }
}

message SessionResponse {
  message Pong {}

  string request_id = 1;
  optional string error = 2;
  oneof response {
    Pong pong = 3;
    SessionRequest.GetStateResponse get_state = 4;
    SessionRequest.GetChatHistoryResponse get_chat_history = 5;
    SessionRequest.SendMessageResponse send_message = 6;
  }
}

message SessionAudioPlaybackFlush {}
message SessionAudioPlaybackClear {}
message SessionAudioPlaybackFinished {}

message AgentSessionMessage {
  oneof message {
    SessionAudioFrame audio_input = 1;
    SessionAudioFrame audio_output = 2;
    SessionEvent event = 3;
    SessionRequest request = 4;
    SessionResponse response = 5;
    SessionAudioPlaybackFlush audio_playback_flush = 6;
    SessionAudioPlaybackClear audio_playback_clear = 7;
    SessionAudioPlaybackFinished audio_playback_finished = 8;
  }
}
