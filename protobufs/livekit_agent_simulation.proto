syntax = "proto3";

package livekit;

import "agent/livekit_agent_session.proto";
import "google/protobuf/timestamp.proto";
import "livekit_cloud_agent.proto";
import "livekit_models.proto";

option csharp_namespace = "LiveKit.Proto";
option go_package = "github.com/livekit/protocol/livekit";
option ruby_package = "LiveKit::Proto";

message SimulationRunSummary {
  int32 passed = 1;
  int32 failed = 2;
  string going_well = 3;
  string to_improve = 4;
  repeated Issue issues = 5;
  map<string, livekit.agent.ChatContext> chat_history = 6;

  message Issue {
    string description = 1;
    string suggestion = 2;
    string label = 3;
  }
}

message SimulationRun {
  enum Status {
    STATUS_PENDING_UPLOAD = 0;
    STATUS_GENERATING = 1;
    STATUS_RUNNING = 2;
    STATUS_SUMMARIZING = 3;
    STATUS_COMPLETED = 4;
    STATUS_FAILED = 5;
    STATUS_CANCELLED = 6;
  }

  message Job {
    enum Status {
      STATUS_PENDING = 0;
      STATUS_RUNNING = 1;
      STATUS_COMPLETED = 2;
      STATUS_FAILED = 3;
      STATUS_CANCELLED = 4;
    }
    string id = 1;
    Status status = 2;
    string instructions = 3;
    string error = 4;
    string agent_expectations = 5;
    string label = 6;
    repeated string tags = 7;
    string room_name = 8;
    reserved 9;  // was scenario_id (scenarios are no longer stored)
    google.protobuf.Timestamp started_at = 10;
    google.protobuf.Timestamp ended_at = 11;
    string room_id = 12;
    Usage usage = 13;
    // Metrics for an audio job, aggregated over the call's measured turns.
    // Unset for text jobs; a -1 field was not measured (see AudioMetrics).
    AudioMetrics audio_metrics = 14;

    message Usage {
      int32 text_turns_count = 1;
      int32 audio_turns_count = 2;
    }

    // Per-call audio metrics, grouped by pipeline stage. A -1 means the metric
    // was not measured for this call; for counts, Scores are 0-1 unless noted.
    message AudioMetrics {
      reserved 21, 30, 31;

      // -- overall --
      float accuracy_score = 1;    // how accurately the agent achieved the intended outcome
      float experience_score = 2;  // overall quality of the caller experience

      // -- speech recognition --
      float stt_wer = 33;                     // word error rate of the agent's transcription of the caller
      float stt_cer = 34;                     // character error rate
      float stt_keyterm_accuracy = 35;        // recall of key terms (names, IDs, amounts) in the transcription
      float stt_transcription_latency_s = 40; // seconds from the end of caller speech to the final transcript

      // -- speech synthesis --
      float tts_ttfb_s = 43;                  // seconds to the first audio of a reply
      float tts_speech_rate_wpm = 45;         // speaking rate, words per minute
      float tts_naturalness_score = 22;       // overall perceptual naturalness
      float tts_prosody_score = 37;           // pitch and intonation
      float tts_expressiveness_score = 38;    // expressiveness and affect
      float tts_enunciation_score = 32;       // clarity of structured entities (emails, phone numbers, codes)
      float tts_uptalk_score = 39;            // appropriate terminal intonation; low = inappropriate uptalk
      float tts_wer = 36;                     // intelligibility: intended text vs a transcription of the output audio
      float tts_conversationality_score = 55; // sounds conversational rather than read-aloud
      float tts_hallucination_rate = 56;      // fraction of output audio not traceable to the input text
      float tts_audio_quality_mos = 57;       // 1-5 mean opinion score (coloration, noise, discontinuity, loudness)
      float tts_voice_consistency_score = 58; // voice stays consistent within and across turns
      int32 tts_spoken_artifact_count = 59;   // spoken markup, clicks, or vowel prolongation

      // -- language model --
      float llm_ttft_s = 41;                  // seconds to the first token
      float llm_ttfs_s = 48;                  // seconds to the first complete sentence
      float llm_throughput_tps = 42;          // output tokens per second

      // -- conversation timing & turn-taking --
      float turn_taking_score = 10;           // overall turn-taking quality
      float response_latency_p50_s = 11;      // reply latency from the audio; a gap is > 0, an overlap < 0
      float response_latency_p90_s = 12;
      float response_latency_p95_s = 13;
      float agent_yield_latency_s = 14;       // seconds for the agent to stop after the caller barges in
      int32 eot_misprediction_count = 15;     // times the agent started before the caller's turn ended
      float overlap_ratio = 16;               // overlapping speech / total speech
      float silence_total_s = 17;             // dead air within the conversation
      int32 awkward_silence_count = 18;       // inter-turn gaps beyond the natural-pause threshold
      int32 unanswered_caller_turns = 19;     // caller spoke but the agent never responded
      int32 false_interruption_count = 23;    // agent paused for what was not a real interruption
      int32 false_interruption_unrecovered_count = 24; // of those, the ones it never resumed from
      float agent_e2e_latency_s = 44;         // agent's self-reported end-to-end reply latency
      int32 interruption_count = 51;          // total barge-ins, caller and agent

      // -- simulator conduct --
      bool simulator_early_termination = 46;  // the simulated caller ended a still-progressing conversation
      bool simulator_late_termination = 47;   // the simulated caller dragged on after the goal was met

      // -- language quality --
      float conciseness_score = 20;           // brevity of the agent's replies

      // -- run context --
      int32 measured_turn_count = 50;         // turns carrying at least one measurement
      bool has_remote_session = 52;           // false when only waveform-derived metrics are available
      string metrics_version = 53;            // metric-suite version; scores compare only within a version
      string judge_model = 54;                // model used for judge-scored metrics

      repeated TurnMetrics turns = 60;        // per-turn breakdown

      message TurnMetrics {
        int32 turn = 1;                        // 1-based turn index
        float response_latency_s = 2;          // reply latency from the audio
        bool agent_cut_in = 3;                 // agent started before the caller finished this turn
        float stt_wer = 4;
        float stt_transcription_latency_s = 5;
        float llm_ttft_s = 6;
        float llm_ttfs_s = 10;
        float tts_ttfb_s = 7;
        float agent_e2e_latency_s = 8;
        float conciseness_score = 9;
      }
    }
  }

  message Create {
    message Request {
      reserved 3;  // was agent_description (input never consumed; description is derived from source)
      reserved "agent_description";
      string project_id = 1;
      string agent_name = 2;
      int32 num_simulations = 4;
      string region = 6;

      // When set, run these scenarios (loaded from a scenarios.yaml).
      // When unset, generate num_simulations scenarios from the uploaded agent source.
      optional ScenarioGroup scenario_group = 7;

      // Maximum simulate jobs running in parallel for this run. Clamped to the
      // project's concurrency quota; 0/unset uses the server default.
      optional int32 concurrency = 8;

      // Conversation mode for every job in this run; unspecified = TEXT.
      SimulationMode mode = 9;
    }
    message Response {
      string simulation_run_id = 1;
      PresignedPostRequest presigned_post_request = 2;
    }
  }

  message ConfirmSourceUpload {
    message Request {
      string project_id = 1;
      string simulation_run_id = 2;
      string code_entrypoint = 3;
    }
    message Response {}
  }

  message Get {
    message Request {
      string project_id = 1;
      string simulation_run_id = 2;
    }
    message Response {
      SimulationRun run = 1;
    }
  }

  message List {
    message Request {
      string project_id = 1;
      optional Status status = 2;
      optional TokenPagination page_token = 3;
    }
    message Response {
      repeated SimulationRun runs = 1;
      TokenPagination next_page_token = 2;
    }
  }

  message Cancel {
    message Request {
      string project_id = 1;
      string simulation_run_id = 2;
    }
    message Response {}
  }

  string id = 1;
  string project_id = 2;
  Status status = 3;
  string agent_description = 4;
  string error = 5;
  google.protobuf.Timestamp created_at = 6;
  repeated Job jobs = 7;
  SimulationRunSummary summary = 8;
  string agent_name = 9;
  ScenarioGroup scenario_group = 10;
  google.protobuf.Timestamp ended_at = 11;
  int32 job_count = 12;
  int32 passed_count = 13;
  int32 failed_count = 14;
  int32 num_simulations = 15;
  // Aggregate usage across all jobs in this run (sum of Job.usage).
  Usage usage = 16;
  // Maximum simulate jobs running in parallel for this run (0 = server default).
  int32 concurrency = 17;
  // Conversation mode for every job in this run; unspecified = TEXT.
  SimulationMode mode = 18;

  message Usage {
    int32 text_turns_count = 1;
    int32 audio_turns_count = 2;
  }
}

// A single scenario, mirroring one entry in a scenarios.yaml file. Scenarios
// are no longer stored server-side; the yaml file is the source of truth.
message Scenario {
  message CreateFromSession {
    message Request {
      string project_id = 1;
      string room_id = 2;
      string region = 3;
    }
    message Response {
      Scenario scenario = 1;
    }
  }

  string label = 1;
  string instructions = 2;
  string agent_expectations = 3;
  // Set as participant attributes on the simulation participant's access token.
  map<string, string> tags = 4;
  // Arbitrary JSON-encoded object, surfaced to the agent under test as
  // SimulationContext userdata (e.g. inputs and benchmark target state).
  string userdata = 5;
}

// A named group of scenarios, mirroring a whole scenarios.yaml file.
message ScenarioGroup {
  string name = 1;
  repeated Scenario scenarios = 2;
}

// How the simulated user interacts with the agent under test.
enum SimulationMode {
  SIMULATION_MODE_UNSPECIFIED = 0;
  // The simulator chats over text streams (no audio).
  SIMULATION_MODE_TEXT = 1;
  // The simulator publishes/subscribes audio in the room.
  SIMULATION_MODE_AUDIO = 2;
}

// Carried (protojson-encoded) in the simulation room's metadata so the agent
// under test can read the scenario + run identity synchronously at connect.
message SimulationDispatch {
  string simulation_run_id = 1;
  string job_id = 2;
  Scenario scenario = 3;
  SimulationMode mode = 4;
}

service AgentSimulation {
  rpc CreateSimulationRun(SimulationRun.Create.Request) returns (SimulationRun.Create.Response);
  rpc ConfirmSimulationSourceUpload(SimulationRun.ConfirmSourceUpload.Request) returns (SimulationRun.ConfirmSourceUpload.Response);
  rpc GetSimulationRun(SimulationRun.Get.Request) returns (SimulationRun.Get.Response);
  rpc ListSimulationRuns(SimulationRun.List.Request) returns (SimulationRun.List.Response);
  rpc CancelSimulationRun(SimulationRun.Cancel.Request) returns (SimulationRun.Cancel.Response);

  rpc CreateScenarioFromSession(Scenario.CreateFromSession.Request) returns (Scenario.CreateFromSession.Response);
}
