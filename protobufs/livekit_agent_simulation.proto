syntax = "proto3";

package livekit;
option go_package = "github.com/livekit/protocol/livekit";
option csharp_namespace = "LiveKit.Proto";
option ruby_package = "LiveKit::Proto";

import "google/protobuf/timestamp.proto";
import "livekit_cloud_agent.proto";
import "livekit_models.proto";
import "agent/livekit_agent_session.proto";

message SimulationRunSummary {
  int32 passed = 1;
  int32 failed = 2;
  string going_well = 3;
  string to_improve = 4;
  repeated Issue issues = 5;
  map<string, livekit.agent.ChatContext> chat_history = 6;

  message Issue {
    string description = 1;
    string suggestion = 2;
  }
}

message SimulationRun {
  enum Status {
    STATUS_PENDING_UPLOAD = 0;
    STATUS_GENERATING = 1;
    STATUS_RUNNING = 2;
    STATUS_SUMMARIZING = 3;
    STATUS_COMPLETED = 4;
    STATUS_FAILED = 5;
    STATUS_CANCELLED = 6;
  }

  message Job {
    enum Status {
      STATUS_PENDING = 0;
      STATUS_RUNNING = 1;
      STATUS_COMPLETED = 2;
      STATUS_FAILED = 3;
      STATUS_CANCELLED = 4;
    }
    string id = 1;
    Status status = 2;
    string instructions = 3;
    string error = 4;
    string agent_expectations = 5;
    string label = 6;
  }

  message Create {
    message Scenario {
      string instructions = 1;
      string agent_expectations = 2;
      map<string, string> metadata = 3;
      string label = 4;
    }
    message Scenarios {
      repeated Scenario scenarios = 1;
    }

    message Request {
      string project_id = 1;
      string agent_name = 2;
      string agent_description = 3;
      int32 num_simulations = 4;
      string region = 6;

      oneof source {
        Scenarios scenarios = 7;
        string group_id = 5;
      }
    }
    message Response {
      string simulation_run_id = 1;
      PresignedPostRequest presigned_post_request = 2;
    }
  }

  message ConfirmSourceUpload {
    message Request {
      string project_id = 1;
      string simulation_run_id = 2;
      string code_entrypoint = 3;
    }
    message Response {}
  }

  message Get {
    message Request {
      string project_id = 1;
      string simulation_run_id = 2;
    }
    message Response {
      SimulationRun run = 1;
    }
  }

  message List {
    message Request {
      string project_id = 1;
      optional Status status = 2;
      optional TokenPagination page_token = 3;
    }
    message Response {
      repeated SimulationRun runs = 1;
      TokenPagination next_page_token = 2;
    }
  }

  message Cancel {
    message Request {
      string project_id = 1;
      string simulation_run_id = 2;
    }
    message Response {}
  }

  string id = 1;
  string project_id = 2;
  Status status = 3;
  string agent_description = 4;
  string error = 5;
  google.protobuf.Timestamp created_at = 6;
  repeated Job jobs = 7;
  SimulationRunSummary summary = 8;
}

message Scenario {
  enum Status {
    // Scenario is being generated from a session by an LLM.
    // instructions and agent_expectations are not yet available.
    STATUS_GENERATING = 0;
    STATUS_READY = 1;
    STATUS_FAILED = 2;
  }

  message Create {
    message Request {
      string project_id = 1;
      string label = 2;
      string instructions = 3;
      string agent_expectations = 4;
      string group_id = 5;
      map<string, string> metadata = 6;
    }
    message Response {
      Scenario scenario = 1;
    }
  }

  message CreateFromSession {
    message Request {
      string project_id = 1;
      string room_id = 2;
      string group_id = 3;
      string label = 4;
      string region = 5;
    }
    message Response {
      Scenario scenario = 1;
    }
  }

  message Delete {
    message Request {
      string project_id = 1;
      string scenario_id = 2;
    }
    message Response {}
  }

  message Update {
    message Request {
      string project_id = 1;
      string scenario_id = 2;
      string label = 3;
      string instructions = 4;
      string agent_expectations = 5;
      string group_id = 6;
      map<string, string> metadata = 7;
    }
    message Response {
      Scenario scenario = 1;
    }
  }

  message List {
    message Request {
      string project_id = 1;
      string group_id = 2;
    }
    message Response {
      repeated Scenario scenarios = 1;
    }
  }

  string id = 1;
  string project_id = 2;
  string label = 3;
  string instructions = 4;
  string agent_expectations = 5;
  string source_room_id = 6;
  google.protobuf.Timestamp created_at = 7;
  Status status = 8;
  string error = 9;
  string group_id = 10;
  // Set as participant attributes on the simulation participant's access token.
  map<string, string> metadata = 11;
}

message ScenarioGroup {
  message Create {
    message Request {
      string project_id = 1;
      string label = 2;
    }
    message Response {
      ScenarioGroup scenario_group = 1;
    }
  }

  message Delete {
    message Request {
      string project_id = 1;
      string group_id = 2;
    }
    message Response {}
  }

  message List {
    message Request {
      string project_id = 1;
    }
    message Response {
      repeated ScenarioGroup scenario_groups = 1;
    }
  }

  string id = 1;
  string project_id = 2;
  string label = 3;
  google.protobuf.Timestamp created_at = 4;
  repeated Scenario scenarios = 5;
}

service AgentSimulation {
  rpc CreateSimulationRun(SimulationRun.Create.Request) returns (SimulationRun.Create.Response);
  rpc ConfirmSimulationSourceUpload(SimulationRun.ConfirmSourceUpload.Request) returns (SimulationRun.ConfirmSourceUpload.Response);
  rpc GetSimulationRun(SimulationRun.Get.Request) returns (SimulationRun.Get.Response);
  rpc ListSimulationRuns(SimulationRun.List.Request) returns (SimulationRun.List.Response);
  rpc CancelSimulationRun(SimulationRun.Cancel.Request) returns (SimulationRun.Cancel.Response);

  rpc CreateScenario(Scenario.Create.Request) returns (Scenario.Create.Response);
  rpc CreateScenarioFromSession(Scenario.CreateFromSession.Request) returns (Scenario.CreateFromSession.Response);
  rpc DeleteScenario(Scenario.Delete.Request) returns (Scenario.Delete.Response);
  rpc UpdateScenario(Scenario.Update.Request) returns (Scenario.Update.Response);

  rpc CreateScenarioGroup(ScenarioGroup.Create.Request) returns (ScenarioGroup.Create.Response);
  rpc DeleteScenarioGroup(ScenarioGroup.Delete.Request) returns (ScenarioGroup.Delete.Response);
  rpc ListScenarioGroups(ScenarioGroup.List.Request) returns (ScenarioGroup.List.Response);

  rpc ListScenarios(Scenario.List.Request) returns (Scenario.List.Response);
}
