syntax = "proto3";

package livekit;

import "agent/livekit_agent_session.proto";
import "google/protobuf/timestamp.proto";
import "livekit_cloud_agent.proto";
import "livekit_models.proto";

option csharp_namespace = "LiveKit.Proto";
option go_package = "github.com/livekit/protocol/livekit";
option ruby_package = "LiveKit::Proto";

message SimulationRunSummary {
  int32 passed = 1;
  int32 failed = 2;
  string going_well = 3;
  string to_improve = 4;
  repeated Issue issues = 5;
  map<string, livekit.agent.ChatContext> chat_history = 6;

  message Issue {
    string description = 1;
    string suggestion = 2;
    string label = 3;
  }
}

message SimulationRun {
  enum Status {
    STATUS_PENDING_UPLOAD = 0;
    STATUS_GENERATING = 1;
    STATUS_RUNNING = 2;
    STATUS_SUMMARIZING = 3;
    STATUS_COMPLETED = 4;
    STATUS_FAILED = 5;
    STATUS_CANCELLED = 6;
  }

  message Job {
    enum Status {
      STATUS_PENDING = 0;
      STATUS_RUNNING = 1;
      STATUS_COMPLETED = 2;
      STATUS_FAILED = 3;
      STATUS_CANCELLED = 4;
    }
    string id = 1;
    Status status = 2;
    string instructions = 3;
    string error = 4;
    string agent_expectations = 5;
    string label = 6;
    repeated string tags = 7;
    string room_name = 8;
    reserved 9;  // was scenario_id (scenarios are no longer stored)
    google.protobuf.Timestamp started_at = 10;
    google.protobuf.Timestamp ended_at = 11;
    string room_id = 12;
    Usage usage = 13;
    // Quality metrics for this job's call. Unset when the job produced none.
    JobMetrics metrics = 14;

    message Usage {
      int32 text_turns_count = 1;
      int32 audio_turns_count = 2;
    }
  }

  message JobMetrics {
    // Headline scores, 0-1, computed by the worker as weighted means over the
    // members that ran (a missing member renormalizes the rest):
    //   accuracy   = task_completion x3 + stt.keyterm_recall + (1 - stt.wer) + tts.enunciation_score
    //   experience = conversation.turn_taking_score x2 + tts.naturalness_score + llm.conciseness_score
    optional float accuracy_score = 1;
    optional float experience_score = 2;
    // The accuracy anchor: the scenario verdict as 1/0, or the fraction of the declared target state the call reached.
    optional float task_completion = 3;

    STT stt = 4;
    LLM llm = 5;
    TTS tts = 6;
    Conversation conversation = 7;
    Simulator simulator = 8;

    // Conversation timeline: one entry per transcript turn, both speakers.
    repeated Turn turns = 9;

    string judge_model = 10;            // text judge for judged scores; "" if none ran
    string audio_judge_model = 11;      // audio (LALM) judge; "" if none ran
    bool has_remote_session = 12;       // false = waveform-only capture (e.g. SIP)
    google.protobuf.Timestamp t0 = 13;  // call start (first speech edge); turn times relative to it

    // The agent's perception of the caller.
    message STT {
      optional float wer = 1;                       // word error rate, pooled: word_errors / words
      optional uint32 words = 2;                    // pooling stats: run WER = sum errors / sum words
      optional uint32 word_errors = 3;
      optional float cer = 4;                       // character error rate, pooled
      optional float keyterm_recall = 5;            // recall of uttered key entities (names, IDs, amounts)
      optional uint32 keyterms_uttered = 6;
      optional uint32 keyterms_recognized = 7;
      optional uint32 transcription_latency_ms = 8; // agent-reported STT/endpointing delay, mean
    }

    message LLM {
      optional uint32 ttft_ms = 1;            // time to first token, mean (per-turn in turns)
      optional uint32 ttfs_ms = 2;            // time to first sentence — the smallest speakable unit
      optional float tokens_per_second = 3;   // decode rate, mean
      optional float conciseness_score = 4;   // judged 0-1: brief enough for voice
    }

    // The agent's voice.
    message TTS {
      // Time to first AUDIO — the user-relevant signal. Some providers stream
      // bytes before actual speech, so byte-level TTFB alone over-promises;
      // it is kept below for disambiguation.
      optional uint32 ttfa_ms = 1;
      optional uint32 ttfb_ms = 2;             // provider byte-level TTFB, agent-reported
      optional float wer = 3;                  // intelligibility: intended text vs a transcription of the output audio
      optional float speech_rate_wpm = 4;      // speaking rate; conversational English ~110-150
      optional float naturalness_score = 5;    // judged 0-1: prosody / expressiveness
      optional float enunciation_score = 6;    // judged 0-1: key entities audibly intact
    }

    // End-to-end floor dynamics, measured off the audio timeline — the ground
    // truth of what the caller hears, independent of agent self-reports.
    message Conversation {
      optional float turn_taking_score = 1;         // 0-1: latency curve + cut-in/barge-in/missed-turn penalties
      optional int32 response_latency_p50_ms = 2;   // floor-transfer offset; a gap is > 0, an overlap < 0
      optional int32 response_latency_p95_ms = 3;
      optional int32 response_latency_p99_ms = 4;
      optional uint32 agent_yield_latency_ms = 5;   // how long the agent talks after a barge-in, mean
      optional uint32 eot_misprediction_count = 6;  // agent started before the caller's turn ended
      optional float overlap_ratio = 7;             // overlapping speech / total speech
      optional uint32 overlap_speech_ms = 8;        // pooling stats for overlap_ratio
      optional uint32 total_speech_ms = 9;
      optional uint32 silence_total_ms = 10;        // dead air within the conversation
      optional uint32 awkward_silence_count = 11;   // gaps past the natural-pause threshold
      optional uint32 unanswered_persona_turns = 12;             // the simulated party spoke, the agent never responded
      optional uint32 false_interruption_count = 13;             // agent paused for a non-interruption
      optional uint32 false_interruption_unrecovered_count = 14; // of those, never resumed
      optional uint32 agent_reported_e2e_latency_ms = 15;        // the agent's own claim, mean
    }

    // Was the call spoiled by the simulator, not the agent? Diagnostic only —
    // never folded into the scores; run aggregation excludes flagged calls
    // from the two headline scores.
    message Simulator {
      optional bool early_termination = 1;  // simulator ended a still-progressing call
      optional bool late_termination = 2;   // simulator dragged on after the goal was met
    }

    message Turn {
      uint32 index = 1;  // 1-based, conversation order
      livekit.agent.ChatRole role = 2; // ASSISTANT — the agent under test, USER — simulator persona.
      optional uint32 start_ms = 3;  // relative to t0; unset if the turn could not be aligned to the audio
      optional uint32 end_ms = 4;
      // Agent-turn measurements; a negative response latency is a cut-in (the
      // agent started before the caller's turn ended).
      optional int32 response_latency_ms = 5;
      optional uint32 transcription_delay_ms = 6;
      optional uint32 llm_ttft_ms = 7;
      optional uint32 llm_ttfs_ms = 8;
      optional uint32 tts_ttfa_ms = 9;
      optional uint32 tts_ttfb_ms = 10;
      optional uint32 agent_reported_e2e_latency_ms = 11;
      optional float conciseness_score = 12;
      optional float naturalness_score = 13;
      optional float enunciation_score = 14;  // judged 0-1: this turn's key entities audibly intact
      repeated string flags = 15;  // judge failure tags ("verbosity_or_filler", ...)
    }
  }

  // Aggregates over this run's jobs. Reuses the JobMetrics group shapes.
  message RunMetrics {
    optional float accuracy_score = 1;     // mean over scored jobs
    optional float experience_score = 2;
    optional float scenario_pass_rate = 3; // share of jobs whose scenario verdict passed

    JobMetrics.STT stt = 4;
    JobMetrics.LLM llm = 5;
    JobMetrics.TTS tts = 6;
    JobMetrics.Conversation conversation = 7;

    uint32 jobs_total = 9;
    uint32 jobs_failed = 10;           // infra failures, excluded from aggregates
    uint32 jobs_simulator_fault = 11;  // spoiled by the simulator: flagged, not scored
  }

  message Create {
    message Request {
      reserved 3;  // was agent_description (input never consumed; description is derived from source)
      reserved "agent_description";
      string project_id = 1;
      string agent_name = 2;
      int32 num_simulations = 4;
      string region = 6;

      // When set, run these scenarios (loaded from a scenarios.yaml).
      // When unset, generate num_simulations scenarios from the uploaded agent source.
      optional ScenarioGroup scenario_group = 7;

      // Maximum simulate jobs running in parallel for this run. Clamped to the
      // project's concurrency quota; 0/unset uses the server default.
      optional int32 concurrency = 8;

      // Conversation mode for every job in this run; unspecified = TEXT.
      SimulationMode mode = 9;
    }
    message Response {
      string simulation_run_id = 1;
      PresignedPostRequest presigned_post_request = 2;
    }
  }

  message ConfirmSourceUpload {
    message Request {
      string project_id = 1;
      string simulation_run_id = 2;
      string code_entrypoint = 3;
    }
    message Response {}
  }

  message Get {
    message Request {
      string project_id = 1;
      string simulation_run_id = 2;
    }
    message Response {
      SimulationRun run = 1;
    }
  }

  message List {
    message Request {
      string project_id = 1;
      optional Status status = 2;
      optional TokenPagination page_token = 3;
    }
    message Response {
      repeated SimulationRun runs = 1;
      TokenPagination next_page_token = 2;
    }
  }

  message Cancel {
    message Request {
      string project_id = 1;
      string simulation_run_id = 2;
    }
    message Response {}
  }

  // One record in a job's live event stream, emitted by the simulator while
  // the conversation runs and persisted in order. Events are append-only and
  // immutable: streams that arrive later (the agent's STT of an earlier
  // utterance, playout timing) are their own events correlated by `ordinal`,
  // never edits. The final JobMetrics.turns remains the authoritative aligned
  // record; events are the live/replay feed.
  message JobEvent {
    enum Type {
      TYPE_UNSPECIFIED = 0;
      // What the simulated user said: the persona's own text (audio mode: the
      // TTS input; text mode: the sent message).
      TYPE_PERSONA_UTTERANCE = 1;
      // The agent's committed reply text, from its conversation items.
      TYPE_AGENT_UTTERANCE = 2;
      // The agent's final STT transcript of a persona utterance. Absent for
      // agents without a session host (e.g. SIP).
      TYPE_AGENT_HEARD_PERSONA = 3;
      // The simulator's STT transcript of the agent's speech.
      TYPE_PERSONA_HEARD_AGENT = 4;
      // Timing enrichment: when persona utterance `ref_ordinal` was audible,
      // truncation by interruption included.
      TYPE_PERSONA_PLAYOUT = 5;
      // Job lifecycle milestone; `phase` is set.
      TYPE_JOB_PHASE = 6;
    }

    enum Phase {
      PHASE_UNSPECIFIED = 0;
      PHASE_CONNECTED = 1;      // simulator joined the room
      PHASE_AGENT_JOINED = 2;   // agent participant found
      PHASE_SESSION_READY = 3;  // agent's session host reachable
      PHASE_CONVERSATION = 4;   // first turn underway
      PHASE_JUDGING = 5;        // call over, verdict pending
      PHASE_FINISHED = 6;       // handler done (informational; the job row is authoritative)
    }

    // One span of the word alignment between a reference text and a
    // transcript of it, produced by the same computation that pools into
    // JobMetrics WER — clients render these, they never recompute.
    message Align {
      enum Kind {
        KIND_UNSPECIFIED = 0;
        KIND_EQUAL = 1;
        KIND_SUBSTITUTION = 2;
        KIND_DELETION = 3;   // reference words the transcript missed
        KIND_INSERTION = 4;  // transcript words with no reference source
      }
      Kind kind = 1;
      string gold = 2;   // normalized reference tokens in this span ("" for insertions)
      string heard = 3;  // normalized transcript tokens ("" for deletions)
    }

    int64 run_seq = 1;   // server-assigned, strictly increasing within the run; the poll cursor
    string job_id = 2;   // SimulationRun.Job.id
    // Queue retry attempt that produced this event. A retried job restarts
    // its stream; clients render only the highest attempt per job.
    uint32 attempt = 3;
    int64 seq = 4;       // producer-assigned, contiguous from 1 per (job_id, attempt); dedup key
    google.protobuf.Timestamp ts = 5;  // producer (simulator) wall clock

    Type type = 6;
    // Counts events of the same Type within the attempt (1-based). Pairs
    // perception streams by order: the Nth AGENT_HEARD_PERSONA transcribes
    // the Nth PERSONA_UTTERANCE.
    uint32 ordinal = 7;
    string text = 8;

    // Heard events (TYPE_AGENT_HEARD_PERSONA, TYPE_PERSONA_HEARD_AGENT):
    // which uttered ordinal `text` transcribes, plus its error rates.
    uint32 ref_ordinal = 9;
    optional float wer = 10;
    optional uint32 words = 11;        // pooling stats: run WER = sum errors / sum words
    optional uint32 word_errors = 12;
    optional float cer = 13;
    repeated Align alignment = 14;

    // TYPE_PERSONA_PLAYOUT: when the utterance was audible (wall clock).
    google.protobuf.Timestamp started_at = 15;
    google.protobuf.Timestamp ended_at = 16;

    // TYPE_AGENT_UTTERANCE: the agent's self-reported pipeline timings.
    optional uint32 transcription_delay_ms = 17;
    optional uint32 llm_ttft_ms = 18;
    optional uint32 tts_ttfb_ms = 19;
    optional uint32 e2e_latency_ms = 20;

    // TYPE_JOB_PHASE:
    Phase phase = 21;
    string detail = 22;  // annotation, e.g. failure reason on PHASE_FINISHED
  }

  message GetEvents {
    message Request {
      string project_id = 1;
      string simulation_run_id = 2;
      // Serve events with run_seq > after; 0 starts from the beginning. The
      // cursor is run-global: events of concurrent jobs interleave, but each
      // job's stream stays internally ordered.
      int64 after = 3;
      // Restrict to one job (SimulationRun.Job.id). Narrows results only;
      // the cursor semantics are unchanged.
      string job_id = 4;
      // Page size; the server clamps (default 500, max 2000).
      int32 limit = 5;
    }
    message Response {
      repeated JobEvent events = 1;  // ascending run_seq
      // Cursor for the next call: run_seq of the last served event, or
      // `after` echoed back when there were none.
      int64 next = 2;
      bool has_more = 3;  // the page was truncated by limit; poll again immediately
      // Progress snapshot. A terminal run_status is the end-of-stream signal:
      // every event is flushed by the time the run terminalizes, even when a
      // worker died mid-job. GetSimulationRun stays the authoritative read.
      Status run_status = 4;
      repeated JobState jobs = 5;

      message JobState {
        string job_id = 1;
        Job.Status status = 2;
      }
    }
  }

  string id = 1;
  string project_id = 2;
  Status status = 3;
  string agent_description = 4;
  string error = 5;
  google.protobuf.Timestamp created_at = 6;
  repeated Job jobs = 7;
  // was: SimulationRunSummary summary (replaced by summary_zstd)
  reserved 8;
  reserved "summary";
  string agent_name = 9;
  ScenarioGroup scenario_group = 10;
  google.protobuf.Timestamp ended_at = 11;
  int32 job_count = 12;
  int32 passed_count = 13;
  int32 failed_count = 14;
  int32 num_simulations = 15;
  // Aggregate usage across all jobs in this run (sum of Job.usage).
  Usage usage = 16;
  // Maximum simulate jobs running in parallel for this run (0 = server default).
  int32 concurrency = 17;
  // Conversation mode for every job in this run; unspecified = TEXT.
  SimulationMode mode = 18;
  // Run-level metric aggregates.
  RunMetrics metrics = 19;

  // zstd-compressed SimulationRunSummary: decompress, then proto.Unmarshal.
  // Compressed by default so the blob ships as-is on every hop.
  bytes summary_zstd = 20;

  message Usage {
    int32 text_turns_count = 1;
    int32 audio_turns_count = 2;
  }
}

// A single scenario, mirroring one entry in a scenarios.yaml file. Scenarios
// are no longer stored server-side; the yaml file is the source of truth.
message Scenario {
  message CreateFromSession {
    message Request {
      string project_id = 1;
      string room_id = 2;
      string region = 3;
    }
    message Response {
      Scenario scenario = 1;
    }
  }

  string label = 1;
  string instructions = 2;
  string agent_expectations = 3;
  // Set as participant attributes on the simulation participant's access token.
  map<string, string> tags = 4;
  // Arbitrary JSON-encoded object, surfaced to the agent under test as
  // SimulationContext userdata (e.g. inputs and benchmark target state).
  string userdata = 5;
}

// A named group of scenarios, mirroring a whole scenarios.yaml file.
message ScenarioGroup {
  string name = 1;
  repeated Scenario scenarios = 2;
}

// How the simulated user interacts with the agent under test.
enum SimulationMode {
  SIMULATION_MODE_UNSPECIFIED = 0;
  // The simulator chats over text streams (no audio).
  SIMULATION_MODE_TEXT = 1;
  // The simulator publishes/subscribes audio in the room.
  SIMULATION_MODE_AUDIO = 2;
}

// Carried (protojson-encoded) in the simulation room's metadata so the agent
// under test can read the scenario + run identity synchronously at connect.
message SimulationDispatch {
  string simulation_run_id = 1;
  string job_id = 2;
  Scenario scenario = 3;
  SimulationMode mode = 4;
}

service AgentSimulation {
  rpc CreateSimulationRun(SimulationRun.Create.Request) returns (SimulationRun.Create.Response);
  rpc ConfirmSimulationSourceUpload(SimulationRun.ConfirmSourceUpload.Request) returns (SimulationRun.ConfirmSourceUpload.Response);
  rpc GetSimulationRun(SimulationRun.Get.Request) returns (SimulationRun.Get.Response);
  rpc GetSimulationRunEvents(SimulationRun.GetEvents.Request) returns (SimulationRun.GetEvents.Response);
  rpc ListSimulationRuns(SimulationRun.List.Request) returns (SimulationRun.List.Response);
  rpc CancelSimulationRun(SimulationRun.Cancel.Request) returns (SimulationRun.Cancel.Response);

  rpc CreateScenarioFromSession(Scenario.CreateFromSession.Request) returns (Scenario.CreateFromSession.Response);
}
